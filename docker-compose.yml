services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: roundup
      POSTGRES_PASSWORD: roundup
      POSTGRES_DB: roundup
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U roundup"]
      interval: 5s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  auth-service:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      DATABASE_URL: postgres://roundup:roundup@postgres:5432/roundup?sslmode=disable
      KAFKA_BROKERS: kafka:9092
      JWT_SECRET: roundup-dev-jwt-secret-min-32-chars!!
      PORT: "8081"
      MIGRATIONS_DIR: /app/migrations
      KAFKA_TLS_ENABLED: "false"
      CORS_ORIGINS: "http://localhost:3000,http://localhost:8080"
      OTLP_ENDPOINT: tempo:4317
      # TLS_CERT_FILE: /tls/cert.pem
      # TLS_KEY_FILE: /tls/key.pem
    ports:
      - "8081:8081"
    # volumes:
    #   - ./certs:/tls:ro

  roundup-engine:
