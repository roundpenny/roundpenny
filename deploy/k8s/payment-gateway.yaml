apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-gateway
  namespace: roundup-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-gateway
  template:
    metadata:
      labels:
        app: payment-gateway
    spec:
      containers:
      - name: payment-gateway
        image: roundup-platform/payment-gateway:latest
        ports:
        - containerPort: 8090
        envFrom:
        - configMapRef:
            name: roundup-config
        env:
        - name: PORT
          value: "8090"
        - name: MIGRATIONS_DIR
          value: "/app/migrations"
        - name: STRIPE_API_KEY
          valueFrom:
            secretKeyRef:
              name: stripe-secret
              key: STRIPE_API_KEY
              optional: true
        - name: STRIPE_WEBHOOK_SECRET
          valueFrom:
            secretKeyRef:
              name: stripe-secret
              key: STRIPE_WEBHOOK_SECRET
              optional: true
        livenessProbe:
          httpGet:
            path: /v1/health
            port: 8090
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /v1/health
            port: 8090
          initialDelaySeconds: 3
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: payment-gateway
  namespace: roundup-platform
spec:
  ports:
  - port: 8090
  selector:
    app: payment-gateway
