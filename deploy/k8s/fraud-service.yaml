apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-service
  namespace: roundup-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fraud-service
  template:
    metadata:
      labels:
        app: fraud-service
    spec:
      containers:
      - name: fraud-service
        image: roundup/fraud-service:latest
        ports:
        - containerPort: 8094
        envFrom:
        - configMapRef:
            name: roundup-config
        env:
        - name: PORT
          value: "8094"
        - name: MIGRATIONS_DIR
          value: "/app/migrations"
        livenessProbe:
          httpGet:
            path: /v1/health
            port: 8094
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /v1/health
            port: 8094
          initialDelaySeconds: 3
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: fraud-service
  namespace: roundup-platform
spec:
  ports:
  - port: 8094
  selector:
    app: fraud-service
