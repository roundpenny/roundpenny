apiVersion: apps/v1
kind: Deployment
metadata:
  name: fee-service
  namespace: roundup-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fee-service
  template:
    metadata:
      labels:
        app: fee-service
    spec:
      containers:
      - name: fee-service
        image: roundup/fee-service:latest
        ports:
        - containerPort: 8085
        envFrom:
        - configMapRef:
            name: roundup-config
        env:
        - name: PORT
          value: "8085"
        livenessProbe:
          httpGet:
            path: /v1/fees/config
            port: 8085
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: fee-service
  namespace: roundup-platform
spec:
  ports:
  - port: 8085
  selector:
    app: fee-service
