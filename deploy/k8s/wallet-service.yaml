apiVersion: apps/v1
kind: Deployment
metadata:
  name: wallet-service
  namespace: roundup-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: wallet-service
  template:
    metadata:
      labels:
        app: wallet-service
    spec:
      containers:
      - name: wallet-service
        image: roundup/wallet-service:latest
        ports:
        - containerPort: 8084
        envFrom:
        - configMapRef:
            name: roundup-config
        env:
        - name: PORT
          value: "8084"
        livenessProbe:
          httpGet:
            path: /v1/wallets/me?user_id=00000000-0000-0000-0000-000000000000
            port: 8084
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: wallet-service
  namespace: roundup-platform
spec:
  ports:
  - port: 8084
  selector:
    app: wallet-service
