apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: roundup-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
      - name: auth-service
        image: roundup/auth-service:latest
        ports:
        - containerPort: 8081
        envFrom:
        - configMapRef:
            name: roundup-config
        env:
        - name: PORT
          value: "8081"
        - name: MIGRATIONS_DIR
          value: "/app/migrations"
        livenessProbe:
          httpGet:
            path: /v1/auth/me
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /v1/auth/me
            port: 8081
          initialDelaySeconds: 3
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: roundup-platform
spec:
  ports:
  - port: 8081
  selector:
    app: auth-service
