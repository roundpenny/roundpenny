apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: roundup-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
    spec:
      containers:
      - name: analytics-service
        image: roundup/analytics-service:latest
        ports:
        - containerPort: 8093
        envFrom:
        - configMapRef:
            name: roundup-config
        env:
        - name: PORT
          value: "8093"
        - name: MIGRATIONS_DIR
          value: "/app/migrations"
        livenessProbe:
          httpGet:
            path: /v1/health
            port: 8093
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /v1/health
            port: 8093
          initialDelaySeconds: 3
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-service
  namespace: roundup-platform
spec:
  ports:
  - port: 8093
  selector:
    app: analytics-service
