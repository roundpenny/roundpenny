apiVersion: apps/v1
kind: Deployment
metadata:
  name: investment-service
  namespace: roundup-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: investment-service
  template:
    metadata:
      labels:
        app: investment-service
    spec:
      containers:
      - name: investment-service
        image: roundup/investment-service:latest
        ports:
        - containerPort: 8086
        envFrom:
        - configMapRef:
            name: roundup-config
        env:
        - name: PORT
          value: "8086"
        livenessProbe:
          httpGet:
            path: /v1/investments/portfolios
            port: 8086
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: investment-service
  namespace: roundup-platform
spec:
  ports:
  - port: 8086
  selector:
    app: investment-service
