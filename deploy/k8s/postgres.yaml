apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: roundup-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          value: "roundup"
        - name: POSTGRES_PASSWORD
          value: "roundup"
        - name: POSTGRES_DB
          value: "roundup"
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: roundup-platform
spec:
  ports:
  - port: 5432
  selector:
    app: postgres
