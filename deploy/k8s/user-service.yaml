apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: roundup-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
      - name: user-service
        image: roundup/user-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8088
        envFrom:
        - configMapRef:
            name: roundup-config
        env:
        - name: PORT
          value: "8088"
        - name: MIGRATIONS_DIR
          value: /app/migrations
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: roundup-platform
spec:
  selector:
    app: user-service
  ports:
  - port: 8088
    targetPort: 8088
    protocol: TCP
    name: http
