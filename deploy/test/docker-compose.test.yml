services:
  auth-service:
    environment:
      PORT: "8081"
      JWT_SECRET: test-secret-not-for-production
      MIGRATIONS_DIR: /app/migrations
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:8081/v1/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  roundup-engine:
