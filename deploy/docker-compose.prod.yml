version: "3.8"

services:
  postgres:
    restart: always
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backups:/backups
    deploy:
      resources:
        limits:
          memory: 2G

  redis:
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    deploy:
      resources:
        limits:
          memory: 512M

  kafka:
    restart: always
    environment:
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - kafkadata:/var/lib/kafka/data
    deploy:
      resources:
        limits:
          memory: 2G

  # Resource limits for all Go services
  auth-service: &service-defaults
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  kong:
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  prometheus:
    restart: always
    volumes:
      - promdata:/prometheus
    deploy:
      resources:
        limits:
          memory: 1G

  grafana:
    restart: always
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
    volumes:
      - grafanadata:/var/lib/grafana
    deploy:
      resources:
        limits:
          memory: 512M

  loki:
    restart: always
    volumes:
      - lokidata:/loki
    deploy:
      resources:
        limits:
          memory: 2G

secrets:
  db_password:
    file: ./secrets/db_password.txt

volumes:
  pgdata:
  redisdata:
  kafkadata:
  promdata:
  grafanadata:
  lokidata:
