namespace: roundup-platform

global:
  imageRegistry: "ghcr.io/roundup-platform"
  imageTag: latest
  imagePullPolicy: Always
  postgres:
    url: "postgres://roundup:${POSTGRES_PASSWORD}@roundup-postgres.${AWS_REGION}.rds.amazonaws.com:5432/roundup?sslmode=require"
  kafka:
    brokers: "b-1.roundup.${AWS_REGION}.msk.amazonaws.com:9094,b-2.roundup.${AWS_REGION}.msk.amazonaws.com:9094,b-3.roundup.${AWS_REGION}.msk.amazonaws.com:9094"
  jwtSecret: ""
  migrationsDir: "/app/migrations"

postgres:
  enabled: false

kafka:
  enabled: false

zookeeper:
  enabled: false

authService:
  enabled: true
  replicaCount: 3
  image: roundup-platform/auth-service
  port: 8081
  env:
    JWT_SECRET: ""
    PORT: "8081"
    MIGRATIONS_DIR: "/app/migrations"
    PRODUCTION: "true"
    CORS_ORIGINS: "https://app.roundup-platform.com,https://admin.roundup-platform.com"
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  livenessProbe:
    path: /v1/auth/me
    port: 8081
  readinessProbe:
    path: /v1/auth/me
    port: 8081

transactionService:
  enabled: true
  replicaCount: 3
  image: roundup-platform/transaction-service
  port: 8083
  env:
    PORT: "8083"
    MIGRATIONS_DIR: "/app/migrations"
