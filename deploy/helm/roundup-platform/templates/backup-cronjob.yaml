apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "roundup-platform.fullname" . }}-backup
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "roundup-platform.labels" . | nindent 4 }}
spec:
  schedule: "{{ .Values.backup.schedule }}"
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 86400
      template:
        spec:
          serviceAccountName: backup-sa
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: postgres:16-alpine
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  DUMP_FILE="/backups/roundpenny-$(date +%Y%m%d-%H%M%S).dump"
                  pg_dump \
                    -h "$POSTGRES_HOST" \
                    -p "$POSTGRES_PORT" \
                    -U "$POSTGRES_USER" \
                    -d "$POSTGRES_DB" \
                    --no-owner --no-acl --format=custom \
                    -f "$DUMP_FILE"
                  gzip "$DUMP_FILE"
                  echo "Backup completed: $(basename ${DUMP_FILE}.gz)"
                  find /backups -name "roundpenny-*.dump.gz" -mtime +{{ .Values.backup.retentionDays }} -delete
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "roundup-platform.fullname" . }}-db
                      key: password
                - name: POSTGRES_HOST
                  valueFrom:
                    configMapKeyRef:
                      name: roundup-config
                      key: POSTGRES_HOST
                - name: POSTGRES_PORT
                  valueFrom:
                    configMapKeyRef:
                      name: roundup-config
                      key: POSTGRES_PORT
                - name: POSTGRES_USER
                  valueFrom:
                    configMapKeyRef:
                      name: roundup-config
                      key: POSTGRES_USER
                - name: POSTGRES_DB
                  value: {{ .Values.postgres.database }}
              volumeMounts:
                - name: backup-storage
                  mountPath: /backups
          volumes:
            - name: backup-storage
              persistentVolumeClaim:
                claimName: {{ include "roundup-platform.fullname" . }}-backup
