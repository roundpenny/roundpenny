global:
  resolve_timeout: 5m
  smtp_smarthost: "${SMTP_HOST:-smtp.example.com:587}"
  smtp_from: "${SMTP_FROM:-alertmanager@roundup-platform.com}"
  smtp_auth_username: "${SMTP_USERNAME:-}"
  smtp_auth_password: "${SMTP_PASSWORD:-}"
  smtp_require_tls: true
  slack_api_url: "${SLACK_WEBHOOK:-}"

route:
  group_by: ["alertname", "severity", "service"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: default
  routes:
  - match:
      severity: critical
    receiver: critical
    repeat_interval: 1h
  - match:
      severity: warning
    receiver: default
    repeat_interval: 4h

receivers:
- name: default
  email_configs:
  - to: "${ALERT_EMAIL:-ops@roundup-platform.com}"
  slack_configs:
  - channel: "#alerts"
    title: '{{ .GroupLabels.alertname }}'
    text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
    send_resolved: true

- name: critical
  email_configs:
  - to: "${ALERT_EMAIL:-ops@roundup-platform.com}"
    send_resolved: true
  slack_configs:
  - channel: "#critical"
    title: '[CRITICAL] {{ .GroupLabels.alertname }}'
    text: '{{ range .Alerts }}{{ .Annotations.description }} ({{ .Labels.service }}){{ end }}'
    send_resolved: true
  webhook_configs:
  - url: "${WEBHOOK_URL:-http://webhook:8080/alertmanager}"
    send_resolved: true

inhibit_rules:
- source_match:
    severity: critical
  target_match:
    severity: warning
  equal: ["alertname", "service"]
