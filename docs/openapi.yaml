components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    PaymentResponse:
      type: object
      properties:
        id: { type: string, format: uuid, description: Payment ID }
        user_id: { type: string, format: uuid }
        transaction_id: { type: string, format: uuid, nullable: true }
        amount: { type: number, description: Payment amount }
        currency: { type: string, example: USD }
        status: { type: string, enum: [pending, completed, failed] }
        payment_method: { type: string }
        stripe_payment_intent_id: { type: string, description: Stripe PaymentIntent ID }
        client_secret: { type: string, description: Stripe client secret for front-end confirmation }
        description: { type: string }
        metadata: { type: object }
        error_message: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        full_name: { type: string }
        role: { type: string, enum: [user, admin] }
        email_verified: { type: boolean }
        kyc_status: { type: string, enum: [none, pending, verified, rejected] }
        mfa_enabled: { type: boolean }
        created_at: { type: string, format: date-time }

    LoginResponse:
      type: object
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
        expires_in: { type: integer }
        user:
          $ref: "#/components/schemas/User"

    TokenResponse:
      type: object
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
        expires_in: { type: integer }

    MfaSetupResponse:
      type: object
      properties:
        secret: { type: string }
        qr_code: { type: string }

    MessageResponse:
      type: object
      properties:
        message: { type: string }

    KycStatus:
      type: object
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        full_name: { type: string }
        document_type: { type: string }
        document_number: { type: string }
        status: { type: string, enum: [pending, verified, rejected] }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    UserProfile:
      type: object
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        display_name: { type: string }
        avatar_url: { type: string }
        bio: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    UserPreferences:
      type: object
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        theme: { type: string }
        notifications_enabled: { type: boolean }
        locale: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Merchant:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        email: { type: string, format: email }
        description: { type: string }
        status: { type: string, enum: [active, inactive, suspended] }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Transaction:
      type: object
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        amount: { type: number }
        currency: { type: string }
        type: { type: string }
        status: { type: string, enum: [pending, completed, failed, refunded] }
        description: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Wallet:
      type: object
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        balance: { type: number }
        currency: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    WithdrawalResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        amount: { type: number }
        destination: { type: object }
        status: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    FeeConfig:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        percentage: { type: number }
        flat_fee: { type: number }
        min_fee: { type: number }
        max_fee: { type: number }
        currency: { type: string }
        is_active: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Portfolio:
      type: object
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        name: { type: string }
        total_value: { type: number }
        cash_balance: { type: number }
        currency: { type: string }
        holdings:
          type: array
          items:
            $ref: "#/components/schemas/PortfolioHolding"
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    PortfolioHolding:
      type: object
      properties:
        id: { type: string, format: uuid }
        portfolio_id: { type: string, format: uuid }
        asset: { type: string }
        quantity: { type: number }
        purchase_price: { type: number }
        current_price: { type: number }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Webhook:
      type: object
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        url: { type: string, format: uri }
        secret: { type: string }
        events:
          type: array
          items: { type: string }
        is_active: { type: boolean }
        description: { type: string }
        retry_count: { type: integer }
        timeout_ms: { type: integer }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    AnalyticsEvent:
      type: object
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        type: { type: string }
        properties: { type: object }
        created_at: { type: string, format: date-time }

    AnalyticsStats:
      type: object
      properties:
        date: { type: string, format: date }
        total_events: { type: integer }
        unique_users: { type: integer }
        event_breakdown: { type: object }

    FraudRule:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        type: { type: string }
        config: { type: object }
        enabled: { type: boolean }
        priority: { type: integer }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    FraudAlert:
      type: object
      properties:
        id: { type: string, format: uuid }
        rule_id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        severity: { type: string }
        message: { type: string }
        metadata: { type: object }
        status: { type: string, enum: [open, investigating, resolved, dismissed] }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    LedgerEntry:
      type: object
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        transaction_id: { type: string, format: uuid }
        amount: { type: number }
        balance_before: { type: number }
        balance_after: { type: number }
        type: { type: string, enum: [debit, credit] }
        description: { type: string }
        created_at: { type: string, format: date-time }

     Notification:
       type: object
       properties:
         id: { type: string, format: uuid }
         user_id: { type: string, format: uuid }
         type: { type: string }
         title: { type: string }
         body: { type: string }
         is_read: { type: boolean }
         created_at: { type: string, format: date-time }

     AdminStats:
       type: object
       properties:
         total_users: { type: integer }
