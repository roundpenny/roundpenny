openapi: "3.0.3"
info:
  title: RoundPenny API
  version: "1.0.0"
  description: RoundPenny — Round-up micro-transaction platform API

servers:
- url: http://localhost:80
  description: Kong Gateway (local development)

paths:
  /v1/auth/register:
    post:
      summary: Register a new user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, name]
              properties:
                email: { type: string, format: email }
                password: { type: string, minLength: 8 }
                name: { type: string }
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400": { description: Bad request }
        "409": { description: Conflict }

  /v1/auth/login:
    post:
      summary: Login with email and password
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401": { description: Invalid credentials }
        "429": { description: Account locked }

  /v1/auth/refresh:
    post:
      summary: Refresh access token
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token: { type: string }
      responses:
        "200":
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "401": { description: Invalid or expired refresh token }

  /v1/auth/logout:
    post:
      summary: Logout and revoke tokens
      tags: [Auth]
      security: [{ BearerAuth: [] }]
      responses:
        "204": { description: Logged out }
        "401": { description: Unauthorized }

  /v1/auth/me:
    get:
      summary: Get current user info
      tags: [Auth]
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: Current user data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401": { description: Unauthorized }

  /v1/auth/oauth/{provider}:
    post:
      summary: OAuth login with provider
      tags: [Auth]
      parameters:
      - name: provider
        in: path
        required: true
        schema: { type: string, enum: [google, github] }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code: { type: string }
                state: { type: string }
                redirect_uri: { type: string }
      responses:
        "200":
          description: OAuth login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400": { description: Bad request }

  /v1/auth/mfa/setup:
    post:
      summary: Setup MFA (generate secret)
      tags: [MFA]
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: MFA secret generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MfaSetupResponse"
        "401": { description: Unauthorized }

  /v1/auth/mfa/enable:
    post:
      summary: Enable MFA with verification code
      tags: [MFA]
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code: { type: string }
      responses:
        "200":
          description: MFA enabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400": { description: Invalid code }
        "401": { description: Unauthorized }

  /v1/auth/mfa/disable:
    post:
      summary: Disable MFA
      tags: [MFA]
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: MFA disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400": { description: Bad request }
        "401": { description: Unauthorized }

  /v1/auth/mfa/verify:
    post:
      summary: Verify MFA code during login
      tags: [MFA]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mfa_token, code]
              properties:
                mfa_token: { type: string }
                code: { type: string }
      responses:
        "200":
          description: MFA verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401": { description: Invalid MFA code }

  /v1/auth/verify-email:
    post:
      summary: Send email verification
      tags: [Auth]
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: Verification email sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400": { description: Bad request }
        "401": { description: Unauthorized }

  /v1/auth/verify-email/confirm:
    post:
      summary: Confirm email verification token
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token: { type: string }
      responses:
        "200":
          description: Email verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400": { description: Invalid token }

  /v1/auth/kyc:
    post:
      summary: Submit KYC application
      tags: [KYC]
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [full_name, document_type, document_number]
              properties:
                full_name: { type: string }
                document_type: { type: string }
                document_number: { type: string }
      responses:
        "201":
          description: KYC submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KycStatus"
        "400": { description: Bad request }
        "401": { description: Unauthorized }

  /v1/auth/kyc/status:
    get:
      summary: Get KYC application status
      tags: [KYC]
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: KYC status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KycStatus"
        "401": { description: Unauthorized }
        "404": { description: No KYC submission found }

  /v1/users/me/profile:
    get:
      summary: Get user profile
      tags: [User]
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401": { description: Unauthorized }
        "404": { description: Profile not found }
    put:
      summary: Update user profile
      tags: [User]
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                display_name: { type: string }
                avatar_url: { type: string }
                bio: { type: string }
      responses:
        "204": { description: Profile updated }
        "400": { description: Bad request }
        "401": { description: Unauthorized }

  /v1/users/me/preferences:
    get:
      summary: Get user preferences
      tags: [User]
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: User preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPreferences"
        "401": { description: Unauthorized }
        "404": { description: Preferences not found }
    put:
      summary: Update user preferences
      tags: [User]
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                theme: { type: string }
                notifications_enabled: { type: boolean }
                locale: { type: string }
      responses:
        "200":
          description: Preferences updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPreferences"
        "400": { description: Bad request }
        "401": { description: Unauthorized }

  /v1/merchants:
    post:
      summary: Create a merchant
      tags: [Merchant]
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email]
              properties:
                name: { type: string }
                email: { type: string, format: email }
                description: { type: string }
      responses:
        "201":
          description: Merchant created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Merchant"
        "400": { description: Bad request }
        "401": { description: Unauthorized }
    get:
      summary: List merchants
      tags: [Merchant]
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: Merchant list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Merchant"
        "401": { description: Unauthorized }

  /v1/merchants/search:
    get:
      summary: Search merchants
      tags: [Merchant]
      security: [{ BearerAuth: [] }]
      parameters:
      - name: q
        in: query
        required: true
        schema: { type: string }
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Merchant"
        "400": { description: Missing query }
        "401": { description: Unauthorized }

  /v1/merchants/{id}:
    get:
      summary: Get a merchant by ID
      tags: [Merchant]
      security: [{ BearerAuth: [] }]
      parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
      responses:
        "200":
          description: Merchant data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Merchant"
        "400": { description: Invalid ID }
        "401": { description: Unauthorized }
        "404": { description: Not found }
    put:
      summary: Update a merchant
      tags: [Merchant]
      security: [{ BearerAuth: [] }]
      parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                email: { type: string, format: email }
                description: { type: string }
      responses:
        "200":
          description: Merchant updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Merchant"
        "400": { description: Bad request }
        "401": { description: Unauthorized }
        "404": { description: Not found }
    delete:
      summary: Delete a merchant
      tags: [Merchant]
      security: [{ BearerAuth: [] }]
      parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
      responses:
        "204": { description: Merchant deleted }
        "400": { description: Invalid ID }
        "401": { description: Unauthorized }
        "404": { description: Not found }

  /v1/transactions:
    post:
      summary: Create a transaction
      tags: [Transaction]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id, amount, currency, type]
              properties:
                user_id: { type: string, format: uuid }
                amount: { type: number }
                currency: { type: string }
                type: { type: string }
                description: { type: string }
      responses:
        "201":
          description: Transaction created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        "400": { description: Bad request }
    get:
      summary: List transactions by user
      tags: [Transaction]
      parameters:
      - name: user_id
        in: query
        required: true
        schema: { type: string, format: uuid }
      responses:
        "200":
          description: Transaction list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"
        "400": { description: Bad request }
        "500": { description: Internal error }

  /v1/transactions/{id}:
    get:
      summary: Get transaction by ID
      tags: [Transaction]
      parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
      responses:
        "200":
          description: Transaction data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        "400": { description: Invalid ID }
        "404": { description: Not found }

  /v1/transactions/webhook/{provider}:
    post:
      summary: Receive transaction webhook
      tags: [Transaction]
      parameters:
      - name: provider
        in: path
        required: true
        schema: { type: string }
      responses:
        "200":
          description: Webhook processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400": { description: Bad request }

  /v1/wallets/me:
    get:
      summary: Get or create wallet
      tags: [Wallet]
      parameters:
      - name: user_id
        in: query
        required: true
        schema: { type: string, format: uuid }
      responses:
        "200":
          description: Wallet data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wallet"
        "400": { description: Bad request }

  /v1/wallets/me/transactions:
    get:
      summary: List wallet transactions
      tags: [Wallet]
      parameters:
      - name: user_id
        in: query
        required: true
        schema: { type: string, format: uuid }
      responses:
        "200":
          description: Wallet transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"
        "400": { description: Bad request }

  /v1/wallets/me/withdraw:
    post:
      summary: Withdraw from wallet
      tags: [Wallet]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id, amount, destination]
              properties:
                user_id: { type: string, format: uuid }
                amount: { type: number }
                destination: { type: object }
      responses:
        "200":
          description: Withdrawal initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WithdrawalResponse"
        "400": { description: Bad request }

  /v1/fees/config:
    get:
      summary: Get fee configuration
      tags: [Fee]
      responses:
        "200":
          description: Fee configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeeConfig"
        "500": { description: Internal error }

  /v1/investments/portfolios:
    get:
      summary: Get investment portfolios
      tags: [Investment]
      responses:
        "200":
          description: Portfolio data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Portfolio"
        "500": { description: Internal error }

  /v1/payments:
    post:
      summary: Create a payment
      tags: [Payment Gateway]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id, amount, currency, payment_method]
              properties:
                user_id: { type: string, format: uuid }
                amount: { type: number }
                currency: { type: string }
                payment_method: { type: string }
                description: { type: string }
                metadata: { type: object }
      responses:
        "201":
          description: Payment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentResponse"
        "400": { description: Bad request }
    get:
      summary: List user payments
      tags: [Payment Gateway]
      parameters:
      - name: user_id
        in: query
        required: true
        schema: { type: string, format: uuid }
      responses:
        "200":
          description: Payment list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PaymentResponse"
        "400": { description: Bad request }

  /v1/payments/{id}:
    get:
      summary: Get payment by ID
      tags: [Payment Gateway]
      parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
      responses:
        "200":
          description: Payment data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentResponse"
        "400": { description: Invalid ID }
        "404": { description: Not found }

  /v1/payments/{id}/confirm:
    post:
      summary: Confirm/succeed a payment
      tags: [Payment Gateway]
      parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                stripe_payment_method_id: { type: string }
      responses:
        "200":
          description: Payment confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentResponse"
        "400": { description: Bad request }
        "404": { description: Not found }

  /v1/webhooks/stripe:
    post:
      summary: Stripe webhook receiver
      tags: [Payment Gateway]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                type: { type: string }
                data: { type: object }
      responses:
        "200":
          description: Webhook processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400": { description: Bad request }
        "404": { description: Payment not found }

  /v1/webhooks:
    post:
      summary: Create a webhook subscription
      tags: [Notification]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id, url, events]
              properties:
                user_id: { type: string, format: uuid }
                url: { type: string, format: uri }
                secret: { type: string }
                events: { type: array, items: { type: string } }
                description: { type: string }
                retry_count: { type: integer }
                timeout_ms: { type: integer }
      responses:
        "201":
          description: Webhook created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Webhook"
        "400": { description: Bad request }
    get:
      summary: List user webhooks
      tags: [Notification]
      parameters:
      - name: user_id
        in: query
        required: true
        schema: { type: string, format: uuid }
      responses:
        "200":
          description: Webhook list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Webhook"
        "400": { description: Bad request }

  /v1/webhooks/{id}:
    get:
      summary: Get webhook by ID
      tags: [Notification]
      parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
      responses:
        "200":
          description: Webhook data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Webhook"
        "400": { description: Invalid ID }
        "404": { description: Not found }
    put:
      summary: Update webhook subscription
      tags: [Notification]
      parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                url: { type: string, format: uri }
                secret: { type: string }
                events: { type: array, items: { type: string } }
                is_active: { type: boolean }
                description: { type: string }
                retry_count: { type: integer }
                timeout_ms: { type: integer }
      responses:
        "200":
          description: Webhook updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Webhook"
        "400": { description: Bad request }
        "404": { description: Not found }
    delete:
      summary: Delete a webhook
      tags: [Notification]
      parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
      responses:
        "204": { description: Webhook deleted }
        "400": { description: Invalid ID }
        "404": { description: Not found }

  /v1/analytics/events:
    post:
      summary: Track an analytics event
      tags: [Analytics]
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type]
              properties:
                type: { type: string }
                properties: { type: object }
      responses:
        "201":
          description: Event tracked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsEvent"
        "400": { description: Bad request }
        "401": { description: Unauthorized }
    get:
      summary: List analytics events
      tags: [Analytics]
      parameters:
      - name: user_id
        in: query
        required: true
        schema: { type: string, format: uuid }
      responses:
        "200":
          description: Event list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnalyticsEvent"
        "400": { description: Bad request }

  /v1/analytics/stats:
    get:
      summary: Get daily analytics stats
      tags: [Analytics]
      parameters:
      - name: start_date
        in: query
        required: true
        schema: { type: string, format: date }
      - name: end_date
        in: query
        required: true
        schema: { type: string, format: date }
      responses:
        "200":
          description: Daily stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsStats"
        "400": { description: Bad request }

  /v1/fraud/rules:
    post:
      summary: Create a fraud rule
      tags: [Fraud]
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, type, config]
              properties:
                name: { type: string }
                type: { type: string }
                config: { type: object }
                enabled: { type: boolean }
                priority: { type: integer }
      responses:
        "201":
          description: Rule created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FraudRule"
        "400": { description: Bad request }
        "401": { description: Unauthorized }
    get:
      summary: List fraud rules
      tags: [Fraud]
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: Rule list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FraudRule"
        "401": { description: Unauthorized }

  /v1/fraud/rules/{id}:
    get:
      summary: Get a fraud rule by ID
      tags: [Fraud]
      security: [{ BearerAuth: [] }]
      parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
      responses:
        "200":
          description: Rule data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FraudRule"
        "400": { description: Invalid ID }
        "401": { description: Unauthorized }
        "404": { description: Not found }
    put:
      summary: Update a fraud rule
      tags: [Fraud]
      security: [{ BearerAuth: [] }]
      parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                type: { type: string }
                config: { type: object }
