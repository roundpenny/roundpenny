<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060a16"/>
      <stop offset="100%" stop-color="#0c1224"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4fc3f7"/>
      <stop offset="100%" stop-color="#69f0ae"/>
    </linearGradient>
    <linearGradient id="glow" x1="50%" y1="50%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#4fc3f7" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#69f0ae" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="lineFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4fc3f7" stop-opacity="0"/>
      <stop offset="50%" stop-color="#4fc3f7" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#69f0ae" stop-opacity="0"/>
    </linearGradient>
    <filter id="glowFilter">
      <feGaussianBlur stdDeviation="50"/>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <clipPath id="codeClip">
      <rect x="340" y="380" width="520" height="130" rx="8"/>
    </clipPath>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <ellipse cx="600" cy="300" rx="450" ry="300" fill="url(#glow)" filter="url(#glowFilter)"/>

  <g stroke="#1a2040" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="90" x2="1200" y2="90"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="270" x2="1200" y2="270"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="450" x2="1200" y2="450"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>

  <rect x="0" y="0" width="1200" height="3" fill="url(#lineFade)"/>

  <g transform="translate(600, 380)">
    <rect x="-240" y="-48" width="480" height="96" rx="10" fill="#0d1326" stroke="#1a2040" stroke-width="1.2"/>
    <rect x="-240" y="-48" width="480" height="28" rx="10" fill="#111829"/>
    <rect x="-240" y="-28" width="480" height="4" fill="#111829"/>
    <circle cx="-210" cy="-34" r="5" fill="#ff5f56"/>
    <circle cx="-192" cy="-34" r="5" fill="#ffbd2e"/>
    <circle cx="-174" cy="-34" r="5" fill="#27c93f"/>
    <text x="-200" y="-14" font-size="10" fill="#546e7a" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace">main.go</text>
    <text x="-220" y="8" font-size="13" fill="#90caf9" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace">
      <tspan fill="#c792ea">func</tspan> <tspan fill="#82aaff">main</tspan>() {
      <tspan x="-220" dy="20"><tspan fill="#c792ea">  go</tspan> <tspan fill="#82aaff">startServer</tspan>()</tspan>
      <tspan x="-220" dy="20">  <tspan fill="#89ddff">fmt</tspan>.Println(<tspan fill="#c3e88d">"RoundPenny ready"</tspan>)</tspan>
    </text>
  </g>

  <g transform="translate(600, 510)">
    <rect x="-120" y="-18" width="240" height="36" rx="18" fill="#4fc3f7" opacity="0.08" stroke="#4fc3f7" stroke-width="1" stroke-opacity="0.25"/>
    <text x="0" y="4" text-anchor="middle" font-size="12" fill="#4fc3f7" font-family="'Inter', 'Segoe UI', sans-serif" letter-spacing="3" font-weight="600">OPEN SOURCE · API-FIRST · KUBERNETES</text>
  </g>

  <g transform="translate(600, 575)">
    <rect x="-145" y="-14" width="290" height="28" rx="14" fill="#1a2040" opacity="0.5"/>
    <text x="0" y="4" text-anchor="middle" font-size="11" fill="#546e7a" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" letter-spacing="1">
      <tspan fill="#4fc3f7">◆</tspan> github.com/roundpenny/roundpenny
    </text>
  </g>
</svg>
